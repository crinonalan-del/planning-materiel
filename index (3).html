<style>
:root{--green:#1a7a4a;--green-light:#e8f5ee;--green-mid:#2da05f;--bg:#f5f7f4;--card:#ffffff;--text:#1c2b1e;--text-muted:#6b7c6e;--border:#dde5de;--red:#c0392b;--red-light:#fdecea;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
header{background:var(--green);color:white;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.header-inner{display:flex;align-items:center;gap:10px;}
.header-inner img{width:36px;height:36px;border-radius:6px;object-fit:contain;background:white;padding:2px;}
.app-name{font-size:17px;font-weight:700;}
.app-sub{font-size:12px;opacity:0.75;margin-top:1px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#aaa;display:inline-block;margin-left:6px;vertical-align:middle;}
.sync-dot.online{background:#4cdb8a;}
.week-nav{background:var(--green);padding:8px 16px 14px;display:flex;align-items:center;gap:10px;}
.week-nav button{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:8px;width:34px;height:34px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.week-label{flex:1;text-align:center;color:white;font-size:14px;font-weight:600;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:10px 4px 12px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-muted);font-size:10px;font-weight:500;}
.nav-btn .icon{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--green);}
.panel{display:none;}.panel.active{display:block;}
.alert-bar{margin:12px 12px 0;background:var(--red-light);border:1px solid #f5c6c2;border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;color:var(--red);display:none;}
.alert-bar.show{display:block;}
.loading{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.planning-grid{min-width:500px;}
.grid-header{display:grid;grid-template-columns:120px repeat(5,1fr);gap:5px;margin-bottom:5px;}
.day-head{background:var(--green);color:white;border-radius:var(--radius-sm);padding:7px 4px;text-align:center;}
.day-head .day-name{font-size:12px;font-weight:600;}
.day-head .day-date{font-size:10px;opacity:0.75;margin-top:1px;}
.chef-row{display:grid;grid-template-columns:120px repeat(5,1fr);gap:5px;margin-bottom:5px;align-items:stretch;}
.chef-name-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;display:flex;align-items:center;justify-content:space-between;gap:4px;}
.chef-name{font-size:12px;font-weight:600;color:var(--text);word-break:break-word;}
.del-chef{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;flex-shrink:0;line-height:1;padding:0 2px;}
.del-chef:active{color:var(--red);}
.day-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px;min-height:50px;display:flex;flex-direction:column;gap:3px;cursor:pointer;}
.day-cell:active{border-color:var(--green);background:var(--green-light);}
.day-cell.has-conflict{border-color:var(--red);background:var(--red-light);}
.mat-tag{background:var(--green-light);color:var(--green);border-radius:5px;padding:3px 6px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:3px;}
.mat-tag.conflict{background:var(--red-light);color:var(--red);}
.mat-tag .rm{font-size:13px;opacity:0.6;cursor:pointer;background:none;border:none;color:inherit;line-height:1;padding:0;}
.cell-hint{font-size:10px;color:var(--text-muted);text-align:center;opacity:0.5;padding:2px 0;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;line-height:1.8;}
.manage-panel{padding:16px;}
.section-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-bottom:14px;}
.add-row input{flex:1;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:15px;background:var(--card);color:var(--text);}
.add-row button{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;}
.list-item-name{font-size:15px;font-weight:500;}
.list-item-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.del-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:13px;cursor:pointer;padding:5px 10px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 20px 36px;transform:translateY(40px);transition:transform 0.25s;max-height:80vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px;}
.mat-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.mat-pick-btn{padding:8px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;}
.mat-pick-btn.selected{background:var(--green-light);border-color:var(--green);color:var(--green);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.btn-primary{flex:1;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-cancel{background:var(--bg);color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 18px;font-size:15px;cursor:pointer;}
.no-mat-msg{font-size:13px;color:var(--text-muted);padding:8px 0;}
</style>
</head>
<body>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getDatabase,ref,onValue,remove,push} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBlmv0NXosZmJP8Z4XUzIUZp7euf58VeVM",authDomain:"planning-materiel.firebaseapp.com",projectId:"planning-materiel",storageBucket:"planning-materiel.firebasestorage.app",messagingSenderId:"236720184466",appId:"1:236720184466:web:079fa43c5be4158ecd5a4b",databaseURL:"https://planning-materiel-default-rtdb.europe-west1.firebasedatabase.app"};
const app=initializeApp(cfg);
const db=getDatabase(app);
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
const DS=['Lun','Mar','Mer','Jeu','Ven'];
let weekOffset=0,modalCtx=null,selectedMat=null;
let state={chefs:{},mats:{},attribs:{}};
const dot=document.getElementById('sync-dot');
function setOnline(v){dot.className='sync-dot'+(v?' online':'');}
onValue(ref(db,'/'),snap=>{
  const v=snap.val()||{};
  state={chefs:v.chefs||{},mats:v.mats||{},attribs:v.attribs||{}};
  setOnline(true);
  renderPlanning();
  const p=document.querySelector('.panel.active');
  if(p&&p.id==='panel-chefs')renderChefsList();
  if(p&&p.id==='panel-machines')renderMatsList();
},()=>setOnline(false));
function getMon(o){const b=new Date(2026,5,22);b.setDate(b.getDate()+o*7);return b;}
function getWeekLabel(o){const m=getMon(o),f=new Date(m);f.setDate(m.getDate()+4);const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});return fmt(m)+' - '+fmt(f);}
function getDayDate(o,i){const m=getMon(o);m.setDate(m.getDate()+i);return m.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
window.changeWeek=function(d){weekOffset+=d;document.getElementById('week-label').textContent=getWeekLabel(weekOffset);renderPlanning();};
function chefs(){return Object.entries(state.chefs).map(([id,v])=>({id,name:v.name}));}
function mats(){return Object.entries(state.mats).map(([id,v])=>({id,name:v.name}));}
function attribs(){return Object.entries(state.attribs).filter(([,v])=>v.week===weekOffset).map(([id,v])=>({id,...v}));}
function conflicts(){
  const a=attribs(),c=new Set();
  for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)
    if(a[i].mat===a[j].mat&&a[i].day===a[j].day)c.add(a[i].mat+'|'+a[i].day);
  return c;
}
function renderPlanning(){
  const c=chefs(),a=attribs(),cf=conflicts();
  document.getElementById('grid-header').innerHTML='<div></div>'+DS.map((d,i)=>'<div class="day-head"><div class="day-name">'+d+'</div><div class="day-date">'+getDayDate(weekOffset,i)+'</div></div>').join('');
  const rows=document.getElementById('grid-rows');
  if(c.length===0){rows.innerHTML='<div class="empty-state">Aucun chef.<br>Allez dans Chefs pour en ajouter.</div>';return;}
  rows.innerHTML=c.map(chef=>{
    const cells=DAYS.map((d,di)=>{
      const cell=a.filter(x=>x.chef===chef.name&&x.day===di);
      const hasC=cell.some(x=>cf.has(x.mat+'|'+x.day));
      const tags=cell.map(x=>{
        const isC=cf.has(x.mat+'|'+x.day);
        return '<div class="mat-tag '+(isC?'conflict':'')+'"><span>'+x.mat+'</span><button class="rm" onclick="removeMat(event,\''+x.id+'\')">x</button></div>';
      }).join('');
      return '<div class="day-cell '+(hasC?'has-conflict':'')+'" onclick="openModal(\''+chef.name+'\','+di+')">'+tags+'<div class="cell-hint">+ ajouter</div></div>';
    }).join('');
    return '<div class="chef-row"><div class="chef-name-cell"><span class="chef-name">'+chef.name+'</span><button class="del-chef" onclick="removeChef(\''+chef.id+'\',\''+chef.name+'\')">x</button></div>'+cells+'</div>';
  }).join('');
  const ab=document.getElementById('alert-bar');
  if(cf.size>0){
    const msgs=[];cf.forEach(k=>{const p=k.split('|');msgs.push(p[0]+' - '+DAYS[+p[1]]);});
    ab.className='alert-bar show';ab.innerHTML='&#9888; <strong>Conflit'+(cf.size>1?'s':'')+' :</strong> '+msgs.join(' / ');
  }else{ab.className='alert-bar';}
}
function renderChefsList(){
  const c=chefs(),el=document.getElementById('chefs-list');
  if(c.length===0){el.innerHTML='<div class="empty-state">Aucun chef.</div>';return;}
  const all=Object.values(state.attribs);
  el.innerHTML=c.map(x=>{
    const nb=all.filter(a=>a.chef===x.name).length;
    return '<div class="list-item"><div><div class="list-item-name">&#128119; '+x.name+'</div><div class="list-item-sub">'+nb+' reservation'+(nb>1?'s':'')+' au total</div></div><button class="del-btn" onclick="removeChef(\''+x.id+'\',\''+x.name+'\')">Supprimer</button></div>';
  }).join('');
}
function renderMatsList(){
  const m=mats(),el=document.getElementById('mats-list');
  if(m.length===0){el.innerHTML='<div class="empty-state">Aucune machine.</div>';return;}
  const all=Object.values(state.attribs);
  el.innerHTML=m.map(x=>{
    const nb=all.filter(a=>a.mat===x.name).length;
    return '<div class="list-item"><div><div class="list-item-name">&#128296; '+x.name+'</div><div class="list-item-sub">'+nb+' reservation'+(nb>1?'s':'')+' au total</div></div><button class="del-btn" onclick="removeMachine(\''+x.id+'\',\''+x.name+'\')">Supprimer</button></div>';
  }).join('');
}
window.addChef=function(){
  const i=document.getElementById('new-chef'),v=i.value.trim();
  if(!v)return;
  if(!chefs().find(c=>c.name===v))push(ref(db,'/chefs'),{name:v});
  i.value='';
};
window.removeChef=function(id,name){
  if(!confirm('Supprimer '+name+' ?'))return;
  remove(ref(db,'/chefs/'+id));
  Object.entries(state.attribs).forEach(([aid,a])=>{if(a.chef===name)remove(ref(db,'/attribs/'+aid));});
};
window.addMat=function(){
  const i=document.getElementById('new-mat'),v=i.value.trim();
  if(!v)return;
  if(!mats().find(m=>m.name===v))push(ref(db,'/mats'),{name:v});
  i.value='';
};
window.removeMachine=function(id,name){
  if(!confirm('Supprimer "'+name+'" ?'))return;
  remove(ref(db,'/mats/'+id));
  Object.entries(state.attribs).forEach(([aid,a])=>{if(a.mat===name)remove(ref(db,'/attribs/'+aid));});
};
window.removeMat=function(e,id){e.stopPropagation();remove(ref(db,'/attribs/'+id));};
window.openModal=function(chef,day){
  modalCtx={chef,day};selectedMat=null;
  document.getElementById('modal-title').textContent=chef;
  document.getElementById('modal-sub').textContent=DAYS[day]+' '+getDayDate(weekOffset,day);
  renderPicker();
  document.getElementById('modal-overlay').classList.add('open');
};
function renderPicker(){
  const m=mats(),picker=document.getElementById('mat-picker'),noMsg=document.getElementById('no-mat-msg');
  if(m.length===0){picker.innerHTML='';noMsg.style.display='block';return;}
  noMsg.style.display='none';
  picker.innerHTML=m.map(x=>'<button class="mat-pick-btn '+(selectedMat===x.name?'selected':'')+'" onclick="selectMat(\''+x.name+'\')">'+x.name+'</button>').join('');
}
window.selectMat=function(m){selectedMat=m;renderPicker();};
window.confirmAttrib=function(){
  if(!selectedMat||!modalCtx){alert('Selectionnez une machine.');return;}
  const ex=attribs().find(a=>a.chef===modalCtx.chef&&a.day===modalCtx.day&&a.mat===selectedMat);
  if(!ex)push(ref(db,'/attribs'),{chef:modalCtx.chef,mat:selectedMat,day:modalCtx.day,week:weekOffset});
  closeModal();
};
window.closeModal=function(){document.getElementById('modal-overlay').classList.remove('open');modalCtx=null;selectedMat=null;};
window.closeModalOutside=function(e){if(e.target===document.getElementById('modal-overlay'))closeModal();};
window.showPanel=function(name){
  ['planning','chefs','machines'].forEach(p=>{
    document.getElementById('panel-'+p).classList.toggle('active',p===name);
    document.getElementById('nav-'+p).classList.toggle('active',p===name);
  });
  const wn=document.querySelector('.week-nav');
  if(wn)wn.style.display=name==='planning'?'flex':'none';
  if(name==='chefs')renderChefsList();
  if(name==='machines')renderMatsList();
};
document.getElementById('new-chef').addEventListener('keydown',e=>{if(e.key==='Enter')window.addChef();});
document.getElementById('new-mat').addEventListener('keydown',e=>{if(e.key==='Enter')window.addMat();});
document.getElementById('week-label').textContent=getWeekLabel(0);
</script>
</body>
</html>
